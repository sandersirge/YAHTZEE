plugins {
    id 'java'
    id 'application'
}

group 'projekt'
version '1.1.0'

repositories {
    mavenCentral()
}

ext {
    junitVersion = '5.11.4'
    javafxVersion = '21.0.2'
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

application {
    mainModule = 'projekt.yahtzee'
    mainClass = 'projekt.yahtzee.YahtzeeApplication'
}

// Detect platform for JavaFX classifier.
def osName = System.getProperty('os.name').toLowerCase()
def osArch = System.getProperty('os.arch').toLowerCase()
def javafxClassifier
if (osName.contains('win')) {
    javafxClassifier = 'win'
} else if (osName.contains('mac')) {
    javafxClassifier = osArch.contains('aarch64') ? 'mac-aarch64' : 'mac'
} else {
    javafxClassifier = osArch.contains('aarch64') ? 'linux-aarch64' : 'linux'
}

dependencies {
    implementation "org.openjfx:javafx-base:${javafxVersion}:${javafxClassifier}"
    implementation "org.openjfx:javafx-graphics:${javafxVersion}:${javafxClassifier}"
    implementation "org.openjfx:javafx-controls:${javafxVersion}:${javafxClassifier}"
    implementation "org.openjfx:javafx-fxml:${javafxVersion}:${javafxClassifier}"
    implementation "org.openjfx:javafx-media:${javafxVersion}:${javafxClassifier}"

    testImplementation("org.junit.jupiter:junit-jupiter-api:${junitVersion}")
    testImplementation("org.junit.jupiter:junit-jupiter-params:${junitVersion}")
    testRuntimeOnly("org.junit.jupiter:junit-jupiter-engine:${junitVersion}")
    testRuntimeOnly("org.junit.platform:junit-platform-launcher")
}


test {
    useJUnitPlatform()
}

javadoc {
    options.encoding = 'UTF-8'
}

// Custom jlink task replacing the beryx jlink plugin.
// Custom jlink task replacing the beryx jlink plugin.
tasks.register('jlink', Exec) {
    description = 'Creates a custom JDK runtime image with jlink'
    group = 'distribution'
    dependsOn 'jar'

    def imageDir = layout.buildDirectory.dir('jlink-image')
    outputs.dir(imageDir)

    doFirst {
        def imagePath = imageDir.get().asFile
        if (imagePath.exists()) {
            imagePath.deleteDir()
        }

        def modulePath = configurations.runtimeClasspath.files
                .collect { it.absolutePath }
                .join(File.pathSeparator)
        modulePath += File.pathSeparator + tasks.named('jar').get().archiveFile.get().asFile.absolutePath

        commandLine 'jlink',
                '--module-path', modulePath,
                '--add-modules', 'projekt.yahtzee',
                '--output', imagePath.absolutePath,
                '--strip-debug',
                '--compress', 'zip-9',
                '--no-header-files',
                '--no-man-pages',
                '--launcher', 'app=projekt.yahtzee/projekt.yahtzee.YahtzeeApplication'
    }
}

